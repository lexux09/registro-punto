<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Punto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --txt:#e2e8f0; --muted:#94a3b8;
    --accent:#3b82f6; --accent2:#2563eb; --border:#334155;
    --work:#22c55e; --vac:#0ea5e9; --rest:#a855f7; --abs:#f59e0b; --baja:#ef4444;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,Arial,sans-serif}
  body{margin:0;background:var(--bg);color:var(--txt);min-height:100vh}
  button{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}
  .btn-ghost{background:var(--card2);color:var(--txt)}
  .btn-ghost:hover{background:#34465f}
  input,select{background:var(--card2);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:10px;font-size:14px;width:100%}
  label{font-size:13px;color:var(--muted);display:block;margin:14px 0 6px}

  /* LOGIN */
  #login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-card{background:var(--card);padding:36px;border-radius:16px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .login-card h1{margin:0 0 6px;font-size:22px;text-align:center}
  .login-card p{margin:0 0 20px;text-align:center;color:var(--muted);font-size:13px}
  .err{color:var(--baja);font-size:13px;text-align:center;min-height:18px;margin-top:10px}

  /* APP */
  #app{display:none;max-width:1000px;margin:0 auto;padding:20px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  header h2{margin:0;font-size:20px}
  .badge{font-size:12px;background:var(--card2);padding:4px 10px;border-radius:20px;color:var(--muted);margin-left:8px}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-head h3{margin:0;font-size:18px;text-transform:capitalize}
  .nav-btns{display:flex;gap:8px}
  .nav-btns button{padding:8px 14px}

  .weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .weekdays div{text-align:center;font-size:12px;color:var(--muted);font-weight:600;padding-bottom:4px;text-transform:uppercase}
  .cell{background:var(--card);border:1px solid var(--border);border-radius:10px;min-height:84px;padding:8px;position:relative;cursor:pointer;transition:.12s;overflow:hidden}
  .cell:hover{border-color:var(--accent);transform:translateY(-2px)}
  .cell.empty{background:transparent;border:none;cursor:default}
  .cell.today{outline:2px solid var(--accent)}
  .cell .num{font-size:13px;font-weight:700}
  .cell.weekend .num{color:var(--muted)}
  .tag{font-size:10px;font-weight:700;color:#fff;border-radius:5px;padding:2px 5px;margin-top:5px;display:inline-block}
  .cell .hours{font-size:11px;color:var(--muted);margin-top:4px}
  .dot{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:16px 0;font-size:12px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

  .summary{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px}
  .stat b{font-size:20px;display:block}
  .stat small{color:var(--muted);font-size:12px}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:50;padding:16px}
  .overlay.show{display:flex}
  .modal{background:var(--card);border-radius:16px;padding:26px;width:380px;max-width:100%;box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .modal h3{margin:0 0 4px}
  .modal .date-lbl{color:var(--muted);font-size:13px;margin-bottom:8px;text-transform:capitalize}
  .types{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .type-btn{padding:10px;border-radius:8px;background:var(--card2);color:var(--txt);font-size:13px;border:2px solid transparent;text-align:center}
  .type-btn.sel{border-color:#fff}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .modal-actions button{flex:1}
  .readonly-note{font-size:12px;color:var(--abs);margin-top:10px;text-align:center}
  @media(max-width:620px){.cell{min-height:64px}.cell .hours{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>🕒 Registro de Punto</h1>
    <p>Inicie sesión para continuar</p>
    <label>Usuario</label>
    <input id="user" placeholder="Nombre de usuario" autocomplete="off">
    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="btn-primary" style="width:100%;margin-top:20px" onclick="login()">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <h2 style="display:inline">🕒 Registro de Punto</h2>
      <span class="badge" id="roleBadge"></span>
    </div>
    <div class="toolbar">
      <select id="empSelect" style="width:auto;display:none" onchange="render()"></select>
      <button class="btn-primary" onclick="exportPDF()">📄 Exportar PDF</button>
      <button class="btn-ghost" onclick="logout()">Salir</button>
    </div>
  </header>

  <div id="warnBanner" style="display:none;background:#7c2d12;border:1px solid var(--abs);color:#fed7aa;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:14px;font-weight:600"></div>

  <div class="cal-head">
    <div class="nav-btns">
      <button class="btn-ghost" onclick="changeMonth(-1)">‹ Anterior</button>
      <button class="btn-ghost" onclick="goToday()">Hoy</button>
      <button class="btn-ghost" onclick="changeMonth(1)">Siguiente ›</button>
    </div>
    <h3 id="monthLbl"></h3>
  </div>

  <div class="weekdays">
    <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
  </div>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <span><i style="background:var(--work)"></i>Trabajo</span>
    <span><i style="background:var(--vac)"></i>Vacaciones</span>
    <span><i style="background:var(--rest)"></i>Descanso</span>
    <span><i style="background:var(--abs)"></i>Ausencia</span>
    <span><i style="background:var(--baja)"></i>Baja</span>
  </div>

  <div class="summary" id="summary"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Registrar día</h3>
    <div class="date-lbl" id="modalDate"></div>

    <label>Tipo de día</label>
    <div class="types" id="typeBtns">
      <div class="type-btn" data-t="trabajo" style="border-left:4px solid var(--work)">Trabajo</div>
      <div class="type-btn" data-t="vacaciones" style="border-left:4px solid var(--vac)">Vacaciones</div>
      <div class="type-btn" data-t="descanso" style="border-left:4px solid var(--rest)">Descanso</div>
      <div class="type-btn" data-t="ausencia" style="border-left:4px solid var(--abs)">Ausencia</div>
      <div class="type-btn" data-t="baja" style="border-left:4px solid var(--baja)">Baja</div>
      <div class="type-btn" data-t="" style="border-left:4px solid var(--muted)">Sin registro</div>
    </div>

    <div id="workFields">
      <div style="display:flex;gap:12px">
        <div style="flex:1"><label>Entrada</label><input type="time" id="entrada"></div>
        <div style="flex:1"><label>Salida</label><input type="time" id="salida"></div>
      </div>
      <label>Nota (opcional)</label>
      <input id="nota" placeholder="Observaciones...">
    </div>

    <div class="readonly-note" id="roNote" style="display:none">🔒 Solo el administrador puede editar registros pasados.</div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="saveBtn" onclick="saveDay()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ===== USUARIOS ===== */
const USERS = {
  "admin": {pass:"123456", role:"admin", name:"Administrador"},
  "joliveira": {pass:"6135", role:"user", name:"Jorge Oliveira"}
};

const TYPES = {
  trabajo:{label:"Trabajo",color:"var(--work)"},
  vacaciones:{label:"Vacaciones",color:"var(--vac)"},
  descanso:{label:"Descanso",color:"var(--rest)"},
  ausencia:{label:"Ausencia",color:"var(--abs)"},
  baja:{label:"Baja",color:"var(--baja)"}
};
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let session = null;        // {username, role, name}
let viewDate = new Date(); // mes mostrado
let selType = "";
let modalKey = null;

/* ===== DATOS (localStorage) ===== */
function loadData(){ try{return JSON.parse(localStorage.getItem("punto_data")||"{}")}catch(e){return {}} }
function saveData(d){ localStorage.setItem("punto_data", JSON.stringify(d)); }
function key(emp,y,m,day){ return emp+"|"+y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"); }

/* ===== LOGIN ===== */
function login(){
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value;
  const acc = USERS[u];
  if(!acc || acc.pass !== p){ document.getElementById("loginErr").textContent="Usuario o contraseña incorrectos"; return; }
  session = {username:u, role:acc.role, name:acc.name};
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("roleBadge").textContent = acc.role==="admin" ? "Administrador" : acc.name;
  setupEmpSelect();
  render();
}
function logout(){ session=null; location.reload(); }

document.getElementById("pass").addEventListener("keydown",e=>{if(e.key==="Enter")login();});

/* Admin puede elegir empleado; usuario solo el suyo */
function setupEmpSelect(){
  const sel = document.getElementById("empSelect");
  if(session.role==="admin"){
    sel.style.display="inline-block";
    sel.innerHTML="";
    Object.keys(USERS).filter(u=>USERS[u].role==="user").forEach(u=>{
      const o=document.createElement("option"); o.value=u; o.textContent=USERS[u].name; sel.appendChild(o);
    });
  } else { sel.style.display="none"; }
}
function currentEmp(){
  return session.role==="admin" ? document.getElementById("empSelect").value : session.username;
}

/* ===== CALENDARIO ===== */
function changeMonth(d){ viewDate.setMonth(viewDate.getMonth()+d); render(); }
function goToday(){ viewDate=new Date(); render(); }

function render(){
  const y=viewDate.getFullYear(), m=viewDate.getMonth();
  document.getElementById("monthLbl").textContent = MONTHS[m]+" "+y;
  const emp=currentEmp();
  const data=loadData();
  const first=new Date(y,m,1);
  let startDay=(first.getDay()+6)%7; // lunes=0
  const days=new Date(y,m+1,0).getDate();
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  const today=new Date();

  for(let i=0;i<startDay;i++){ const e=document.createElement("div"); e.className="cell empty"; grid.appendChild(e); }

  const stats={trabajo:0,vacaciones:0,descanso:0,ausencia:0,baja:0,horas:0};
  const pendientes=[];

  for(let d=1;d<=days;d++){
    const cell=document.createElement("div");
    const dow=new Date(y,m,d).getDay();
    cell.className="cell"+((dow===0||dow===6)?" weekend":"");
    if(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate()) cell.classList.add("today");
    const rec=data[key(emp,y,m,d)];
    let inner='<div class="num">'+d+'</div>';
    if(rec&&rec.type){
      const t=TYPES[rec.type];
      inner+='<span class="dot" style="background:'+t.color+'"></span>';
      inner+='<span class="tag" style="background:'+t.color+'">'+t.label+'</span>';
      stats[rec.type]++;
      if(rec.type==="trabajo"){
        if(rec.entrada&&rec.salida){
          const h=hoursBetween(rec.entrada,rec.salida);
          stats.horas+=h;
          inner+='<div class="hours">'+rec.entrada+'–'+rec.salida+'<br>'+h.toFixed(1)+'h</div>';
        } else if(rec.entrada&&!rec.salida){
          pendientes.push(d);
          inner+='<span class="tag" style="background:var(--abs);margin-left:4px">⚠ sin salida</span>';
          inner+='<div class="hours">'+rec.entrada+'–??</div>';
        }
      }
    }
    cell.innerHTML=inner;
    cell.onclick=()=>openModal(d);
    grid.appendChild(cell);
  }

  const banner=document.getElementById("warnBanner");
  if(pendientes.length){
    banner.style.display="block";
    banner.innerHTML="⚠ Registro sin finalizar: falta la hora de salida del día "+
      pendientes.join(", ")+" de "+MONTHS[m]+".";
  } else { banner.style.display="none"; }

  document.getElementById("summary").innerHTML=
    stat(stats.horas.toFixed(1)+"h","Horas trabajadas")+
    stat(stats.trabajo,"Días trabajados")+
    stat(stats.vacaciones,"Vacaciones")+
    stat(stats.descanso,"Descanso")+
    stat(stats.ausencia,"Ausencias")+
    stat(stats.baja,"Bajas");
}
function stat(v,l){ return '<div class="stat"><b>'+v+'</b><small>'+l+'</small></div>'; }
function hoursBetween(a,b){
  const [h1,m1]=a.split(":").map(Number), [h2,m2]=b.split(":").map(Number);
  let diff=(h2*60+m2)-(h1*60+m1); if(diff<0)diff+=1440; return diff/60;
}

/* ===== MODAL ===== */
function openModal(d){
  const y=viewDate.getFullYear(), m=viewDate.getMonth();
  const emp=currentEmp();
  modalKey=key(emp,y,m,d);
  const rec=loadData()[modalKey]||{};
  document.getElementById("modalDate").textContent =
    (session.role==="admin"?USERS[emp].name+" · ":"") + d+" de "+MONTHS[m]+" de "+y;

  selType=rec.type||"";
  document.querySelectorAll(".type-btn").forEach(b=>b.classList.toggle("sel",b.dataset.t===selType));
  document.getElementById("entrada").value=rec.entrada||"";
  document.getElementById("salida").value=rec.salida||"";
  document.getElementById("nota").value=rec.nota||"";
  toggleWork();

  // todos los usuarios pueden editar libremente cualquier fecha
  document.getElementById("roNote").style.display="none";
  document.getElementById("saveBtn").style.display="block";
  document.querySelectorAll(".type-btn").forEach(b=>b.style.pointerEvents="auto");
  document.querySelectorAll("#workFields input").forEach(i=>i.disabled=false);

  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});

document.querySelectorAll(".type-btn").forEach(b=>{
  b.onclick=()=>{ selType=b.dataset.t;
    document.querySelectorAll(".type-btn").forEach(x=>x.classList.toggle("sel",x===b));
    toggleWork(); };
});
function toggleWork(){ document.getElementById("workFields").style.display = selType==="trabajo"?"block":"none"; }

function saveDay(){
  const data=loadData();
  if(!selType){ delete data[modalKey]; }
  else{
    const rec={type:selType};
    if(selType==="trabajo"){
      rec.entrada=document.getElementById("entrada").value;
      rec.salida=document.getElementById("salida").value;
      rec.nota=document.getElementById("nota").value;
      if(!rec.entrada){ alert("Indique al menos la hora de entrada."); return; }
    }
    data[modalKey]=rec;
  }
  saveData(data);
  closeModal();
  render();
}

/* ===== EXPORTAR PDF ===== */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const y=viewDate.getFullYear(), m=viewDate.getMonth(), emp=currentEmp();
  const data=loadData();
  const days=new Date(y,m+1,0).getDate();

  // Geometría de la tabla
  const L=14, R=196, W=R-L;                  // márgenes izq/der
  // columnas: x inicial de cada una (la última define el borde derecho)
  const C={ dia:L, tipo:L+30, ent:L+74, sal:L+104, hor:L+134, nota:L+158 };
  const ROW=7.5;
  const DOWN=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  // ---- Cabecera del documento ----
  doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text("Hoja de Punto",105,18,{align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text("Empleado: "+USERS[emp].name,L,30);
  doc.text("Mes: "+MONTHS[m]+" "+y,L,37);
  doc.text("Generado: "+new Date().toLocaleDateString("es-ES"),R,30,{align:"right"});

  // ---- Cabecera de la tabla ----
  function drawHeader(top){
    doc.setFillColor(37,99,235);
    doc.rect(L,top,W,8,"F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    const ty=top+5.4;
    doc.text("Día",C.dia+2,ty);
    doc.text("Tipo",C.tipo+2,ty);
    doc.text("Entrada",C.ent+2,ty);
    doc.text("Salida",C.sal+2,ty);
    doc.text("Horas",C.hor+2,ty);
    doc.text("Nota",C.nota+2,ty);
    doc.setTextColor(0); doc.setFont("helvetica","normal");
    return top+8;
  }

  let top=44;
  let yTop=drawHeader(top);   // borde superior de la primera fila de datos
  let total=0, dTrab=0,dVac=0,dDes=0,dAus=0,dBaja=0;

  for(let d=1;d<=days;d++){
    if(yTop+ROW>285){ doc.addPage(); yTop=drawHeader(20); }
    const rec=data[key(emp,y,m,d)]||{};
    const w=new Date(y,m,d).getDay();
    const isWeekend=(w===0||w===6);

    // fondo de fila
    if(isWeekend){ doc.setFillColor(235,238,243); doc.rect(L,yTop,W,ROW,"F"); }
    else if(d%2===0){ doc.setFillColor(245,247,250); doc.rect(L,yTop,W,ROW,"F"); }

    const ty=yTop+ROW-2.6;   // línea base del texto
    doc.setFontSize(9);
    doc.setTextColor(isWeekend?130:0);
    doc.text(String(d).padStart(2,"0")+" "+DOWN[w],C.dia+2,ty);

    if(rec.type){
      doc.setTextColor(0);
      doc.text(TYPES[rec.type].label,C.tipo+2,ty);
      if(rec.type==="trabajo"){
        doc.text(rec.entrada||"—",C.ent+2,ty);
        doc.text(rec.salida||"—",C.sal+2,ty);
        let h="—";
        if(rec.entrada&&rec.salida){ const hh=hoursBetween(rec.entrada,rec.salida); total+=hh; h=hh.toFixed(1); }
        doc.text(h,C.hor+2,ty);
        if(rec.nota) doc.text(String(rec.nota).substring(0,20),C.nota+2,ty);
        dTrab++;
      } else if(rec.type==="vacaciones")dVac++;
        else if(rec.type==="descanso")dDes++;
        else if(rec.type==="ausencia")dAus++;
        else if(rec.type==="baja")dBaja++;
    }
    yTop+=ROW;
  }

  // ---- Bordes de la rejilla ----
  doc.setDrawColor(180); doc.setLineWidth(0.2);
  const gridTop=top+8;
  // líneas horizontales
  for(let yy=gridTop; yy<=yTop+0.01; yy+=ROW){ doc.line(L,yy,R,yy); }
  // borde exterior + verticales
  doc.setDrawColor(120); doc.setLineWidth(0.3);
  doc.rect(L,top,W,yTop-top);
  [C.tipo,C.ent,C.sal,C.hor,C.nota].forEach(x=>doc.line(x,gridTop,x,yTop));

  // ---- Resumen ----
  let yy=yTop+12; if(yy>270){doc.addPage();yy=20;}
  doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(0);
  doc.text("Total horas trabajadas: "+total.toFixed(1)+" h",L,yy);
  yy+=9;
  doc.setFont("helvetica","normal"); doc.setFontSize(10);
  const res=[["Días trabajados",dTrab],["Vacaciones",dVac],["Descanso",dDes],["Ausencias",dAus],["Bajas",dBaja]];
  let cx=L;
  res.forEach(([l,v])=>{ doc.text(l+": "+v,cx,yy); cx+=37; });

  // ---- Firmas ----
  yy+=24;
  doc.line(L,yy,L+70,yy); doc.line(R-70,yy,R,yy);
  doc.setFontSize(9); doc.setTextColor(90);
  doc.text("Firma del empleado",L,yy+5);
  doc.text("Firma del responsable",R-70,yy+5);

  doc.save("hoja-punto-"+USERS[emp].name.replace(/ /g,"_")+"-"+MONTHS[m]+"-"+y+".pdf");
}
</script>
</body>
</html>
